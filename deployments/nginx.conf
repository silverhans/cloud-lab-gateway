worker_processes auto;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"duration":$request_time,'
        '"user_agent":"$http_user_agent",'
        '"x_request_id":"$http_x_request_id"'
    '}';
    access_log /var/log/nginx/access.log json;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'" always;

    # Rate limiting buckets
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;

    upstream gateway   { server gateway:8080; keepalive 32; }
    upstream frontend  { server frontend:80;  keepalive 16; }

    server {
        listen 80 default_server;
        server_name _;

        client_max_body_size 1m;

        # SSE — disable buffering, long timeout
        location /sse/ {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header X-Request-Id $http_x_request_id;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 1h;
            chunked_transfer_encoding off;
        }

        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Request-Id $http_x_request_id;
        }

        location /api/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Request-Id $http_x_request_id;
        }

        location /lti/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        location /healthz {
            proxy_pass http://gateway;
            access_log off;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }
    }
}
