run:
  timeout: 5m
  tests: true
  go: "1.22"

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - gosimple
    - revive
    - bodyclose
    - contextcheck
    - errorlint
    - exhaustive
    - forbidigo
    - gocyclo
    - goconst
    - goimports
    - misspell
    - nakedret
    - nilerr
    - nilnil
    - noctx
    - prealloc
    - rowserrcheck
    - sqlclosecheck
    - thelper
    - unconvert
    - unparam
    - wastedassign
    # gosec runs as a separate CI job — keeping it out of golangci-lint avoids
    # double-reporting and lets the dedicated job tune severity independently.

linters-settings:
  errcheck:
    check-type-assertions: true
    # check-blank intentionally off: `_ = log.Sync()` and `_ = godotenv.Load()`
    # are idiomatic patterns for "I genuinely don't care about this error".
  govet:
    enable-all: true
    disable:
      - fieldalignment   # noisy, low signal for hackathon
  gocyclo:
    min-complexity: 20
  goconst:
    min-len: 4
    min-occurrences: 3
  revive:
    severity: warning
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: if-return
      - name: increment-decrement
      - name: indent-error-flow
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: var-declaration
      - name: var-naming
      # `exported` rule intentionally OFF: domain aggregates intentionally
      # carry contextful names (lab.LabInstance, audit.AuditEvent) even at
      # the cost of stutter, because they are read by humans more often than
      # they are typed. revive's `exported` flags this as a violation.
  forbidigo:
    forbid:
      - p: '^fmt\.Print(|f|ln)$'
        msg: "use structured logger (zap), not fmt.Print*"
      - p: 'lab\.LabInstance\.\State\s*='
        msg: "do not mutate LabInstance.State directly; use Transition()"
      - p: 'pool\.Project\.State\s*='
        msg: "do not mutate Project.State directly; use AllocateTo/Release/MarkClean/QuarantineNow"
      # `panic` intentionally NOT forbidden: it is the contract of `Must*`
      # constructors (logger.MustNew, lab.MustTransition). Genuine misuse
      # is caught by code review.

issues:
  exclude-dirs:
    - bin
    - vendor
    - web
    - migrations
  exclude-rules:
    - path: '_test\.go$'
      linters: [gosec, forbidigo, gocyclo, errcheck, govet]
    - path: 'cmd/'
      linters: [forbidigo]   # cmd/* may use fmt for CLI output
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  sort-results: true
