<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Moodle Emulator</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --ink: #17211a;
        --muted: #637064;
        --card: #fffaf0;
        --line: #ddcfb7;
        --accent: #1b6b55;
        --accent-ink: #ffffff;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top left, #d9f2d6, transparent 32rem), var(--bg);
        color: var(--ink);
        font-family: Georgia, "Times New Roman", serif;
      }
      main {
        margin: 0 auto;
        max-width: 980px;
        padding: 42px 22px 64px;
      }
      header {
        margin-bottom: 28px;
      }
      h1 {
        font-size: clamp(34px, 6vw, 62px);
        line-height: 0.95;
        margin: 0 0 10px;
      }
      .hint {
        color: var(--muted);
        font-size: 18px;
      }
      .toolbar, .course {
        background: color-mix(in srgb, var(--card) 92%, white);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: 0 18px 48px rgb(33 28 17 / 12%);
      }
      .toolbar {
        align-items: center;
        display: flex;
        gap: 14px;
        justify-content: space-between;
        margin-bottom: 20px;
        padding: 16px 18px;
      }
      select {
        background: white;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--ink);
        font: inherit;
        padding: 10px 14px;
      }
      .grid {
        display: grid;
        gap: 18px;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }
      .course {
        padding: 22px;
      }
      .course h2 {
        margin: 0 0 4px;
      }
      .course code {
        color: var(--muted);
      }
      .lab {
        align-items: center;
        border-top: 1px solid var(--line);
        display: flex;
        gap: 12px;
        justify-content: space-between;
        margin-top: 16px;
        padding-top: 16px;
      }
      button {
        background: var(--accent);
        border: 0;
        border-radius: 999px;
        color: var(--accent-ink);
        cursor: pointer;
        font: 700 14px/1.1 system-ui, sans-serif;
        padding: 11px 15px;
      }
      button:hover {
        filter: brightness(1.06);
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Moodle Emulator (demo)</h1>
        <p class="hint">Выберите пользователя и запустите LTI 1.3 resource link launch в Cloud Lab Gateway.</p>
      </header>

      <form class="toolbar" method="post" action="/launch" id="launch-form">
        <label for="user">Пользователь</label>
        <select id="user" name="user">
          {{range .Users}}
            <option value="{{.ExternalID}}">{{.Name}} · {{.Role}}</option>
          {{end}}
        </select>
      </form>

      <section class="grid">
        {{range .Courses}}
          {{$course := .}}
          <article class="course">
            <h2>{{.Title}}</h2>
            <code>{{.ExternalID}}</code>
            {{range .Labs}}
              <div class="lab">
                <div>
                  <strong>{{.Title}}</strong><br>
                  <code>{{.Slug}}</code>
                </div>
                <button
                  form="launch-form"
                  formaction="/launch?course={{$course.ExternalID}}&lab={{.Slug}}"
                  formmethod="post"
                  type="submit"
                >
                  Запустить лабу
                </button>
              </div>
            {{end}}
          </article>
        {{end}}
      </section>
    </main>
  </body>
</html>
