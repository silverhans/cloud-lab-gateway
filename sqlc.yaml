version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/adapters/storage/queries"
    schema: "migrations"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/adapters/storage/sqlcgen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        output_db_file_name: "db.gen.go"
        output_models_file_name: "models.gen.go"
        output_queries_file_name: "queries.gen.go"
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              type: "uuid.NullUUID"
              import: "github.com/google/uuid"
